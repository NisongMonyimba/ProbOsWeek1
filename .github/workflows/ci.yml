# =============================================================================
# .github/workflows/ci.yml
# ProbOS Continuous Integration Pipeline
#
# WHAT THIS DOES:
#   Every push or pull request to main triggers:
#   1. Fresh Ubuntu 22.04 VM
#   2. Python 3.11 + C++20 + CMake + Ninja + Google Test
#   3. 202 Python tests (pytest)
#   4. mypy strict type checking
#   5. ruff lint
#   6. All Week 2 + Week 3 examples
#   7. 13 C++ tests
#   8. LaTeX manuscript compilation (13 pages)
#   9. Full integration (RunTests.sh equivalent)
#
# WHERE TO SEE RESULTS:
#   https://github.com/NisongMonyimba/ProbOs/actions
#
# BADGE:
#   ![CI](https://github.com/NisongMonyimba/ProbOs/actions/workflows/ci.yml/badge.svg)
# =============================================================================

name: ProbOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:

  # ===========================================================================
  # JOB 1: Python tests + static analysis
  # ===========================================================================
  python-tests:
    name: Python Tests (202 pytest + mypy + ruff)
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install SALib matplotlib scipy

      - name: Run pytest (202 tests)
        run: |
          python -m pytest python/tests/ -v --tb=short --no-header
          echo "pytest exit: $?"

      - name: mypy strict type check
        run: |
          python -m mypy \
            python/src/distributions.py \
            python/src/state.py \
            python/src/battery_model.py \
            python/src/monte_carlo.py \
            python/src/sensitivity.py \
            python/src/provenance.py \
            --strict \
            --ignore-missing-imports \
            --explicit-package-bases \
            --no-error-summary
          echo "mypy exit: $?"

      - name: ruff lint
        run: |
          python -m ruff check python/src/ python/tests/ --select E,F,W
          echo "ruff exit: $?"

      - name: Run Week 2 examples
        run: |
          python python/examples/week2_battery_ode.py

      - name: Run Week 3 examples
        run: |
          python python/examples/week3_mc_battery.py
          python python/examples/week3_clt_convergence.py
          python python/examples/week3_sobol_battery.py

      - name: Upload figures
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: example-figures
          path: |
            week2_battery_ode.png
            week3_mc_battery.png
            week3_clt_convergence.png
            week3_sobol_battery.png
          retention-days: 30

  # ===========================================================================
  # JOB 2: C++ build and tests
  # ===========================================================================
  cpp-tests:
    name: C++ Tests (cmake + ninja + ctest)
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install C++ dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            libgtest-dev \
            libgmock-dev
          echo "g++ version: $(g++ --version | head -1)"
          echo "cmake version: $(cmake --version | head -1)"

      - name: Configure CMake (C++20)
        working-directory: cpp
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -Wno-dev

      - name: Build C++
        working-directory: cpp
        run: cmake --build build

      - name: Run C++ tests (13 tests)
        working-directory: cpp
        run: |
          ./build/test_normal --gtest_brief=1
          echo "C++ exit: $?"

  # ===========================================================================
  # JOB 3: LaTeX manuscript
  # ===========================================================================
  manuscript:
    name: LaTeX Manuscript (13 pages)
    runs-on: ubuntu-22.04

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install LaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            texlive-latex-extra \
            texlive-science \
            texlive-pictures \
            texlive-fonts-recommended

      - name: Set up Python for figures
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate figures
        run: |
          pip install --upgrade pip -q
          pip install -e ".[dev]" -q
          pip install SALib matplotlib scipy -q
          python python/examples/week2_battery_ode.py || true
          python python/examples/week3_mc_battery.py || true
          python python/examples/week3_clt_convergence.py || true
          python python/examples/week3_sobol_battery.py || true
          cp week2_battery_ode.png manuscript/ 2>/dev/null || true
          cp week3_mc_battery.png manuscript/ 2>/dev/null || true
          cp week3_clt_convergence.png manuscript/ 2>/dev/null || true
          cp week3_sobol_battery.png manuscript/ 2>/dev/null || true

      - name: Compile manuscript
        run: |
          cd manuscript
          pdflatex -interaction=nonstopmode main.tex || true
          bibtex main || true
          pdflatex -interaction=nonstopmode main.tex || true
          pdflatex -interaction=nonstopmode main.tex
          ls -lh main.pdf

      - name: Upload manuscript PDF
        uses: actions/upload-artifact@v4
        with:
          name: manuscript-pdf
          path: manuscript/main.pdf
          retention-days: 90

  # ===========================================================================
  # JOB 4: Full integration (RunTests.sh equivalent)
  # ===========================================================================
  integration:
    name: Full Integration (202 Python + 13 C++)
    runs-on: ubuntu-22.04
    needs: [ python-tests, cpp-tests ]

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install C++ dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            libgtest-dev libgmock-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"
          pip install SALib matplotlib scipy

      - name: Build C++
        working-directory: cpp
        run: |
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -Wno-dev
          cmake --build build

      - name: Run all Python tests
        run: python -m pytest python/tests/ -q --tb=short --no-header

      - name: Run all C++ tests
        working-directory: cpp
        run: ./build/test_normal --gtest_brief=1

      - name: mypy + ruff
        run: |
          python -m mypy \
            python/src/distributions.py \
            python/src/state.py \
            python/src/battery_model.py \
            python/src/monte_carlo.py \
            python/src/sensitivity.py \
            python/src/provenance.py \
            --strict --ignore-missing-imports \
            --explicit-package-bases --no-error-summary
          python -m ruff check python/src/ python/tests/ --select E,F,W

      - name: Run all examples
        run: |
          python python/examples/week2_battery_ode.py
          python python/examples/week3_mc_battery.py
          python python/examples/week3_clt_convergence.py
          python python/examples/week3_sobol_battery.py

      - name: Print summary
        run: |
          echo "============================================================"
          echo "  PROBOS CI -- ALL JOBS PASSED"
          echo "  Week 1 : 44 Python tests (distributions)"
          echo "  Week 2 : 67 Python tests (state + battery model)"
          echo "  Week 3 : 91 Python tests (MC + Sobol + provenance)"
          echo "  Total  : 202 Python + 13 C++ = 215 tests"
          echo "  mypy   : 0 errors"
          echo "  ruff   : 0 warnings"
          echo "  Paper  : 13 pages"
          echo "============================================================"
